apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      containers:
      - name: webapp
        image: jayjuhoonchoi/devops-journey:latest
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: webapp-argocd
  namespace: default
spec:
  selector:
    app: webapp
  type: NodePort
  ports:
  - port: 80
    targetPort: 5000
