name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: 코드 가져오기
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: DockerHub 로그인
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 3: Docker 이미지 빌드 & push
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./week03/day15/app
          push: true
          tags: jayjuhoonchoi/devops-journey:latest

      # Step 4: EC2에 SSH 접속해서 자동 배포!
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 최신 이미지 pull
            docker pull jayjuhoonchoi/devops-journey:latest

            # 기존 컨테이너 중지 & 삭제
            docker stop webapp || true
            docker rm webapp || true

            # 새 컨테이너 실행
            docker run -d \
              --name webapp \
              --restart always \
              -p 5000:5000 \
              jayjuhoonchoi/devops-journey:latest

            echo "Deployment complete!"
