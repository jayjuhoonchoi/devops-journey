name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./week03/day15/app
          push: true
          tags: jayjuhoonchoi/devops-journey:latest

      - name: Deploy to EC2
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USER }}
        run: |
          # base64 디코딩해서 키 파일 생성
          echo "$SSH_KEY" | base64 -d > private_key.pem
          chmod 600 private_key.pem

          # EC2에 SSH 접속해서 배포
          ssh -i private_key.pem \
              -o StrictHostKeyChecking=no \
              $USER@$HOST << 'DEPLOY'
            docker pull jayjuhoonchoi/devops-journey:latest
            docker stop webapp || true
            docker rm webapp || true
            docker run -d \
              --name webapp \
              --restart always \
              -p 5000:5000 \
              jayjuhoonchoi/devops-journey:latest
            echo "Deployment complete!"
          DEPLOY

          # 키 파일 삭제
          rm -f private_key.pem
